function fmt(n) {
  if (n == null) return "—";
  if (n >= 1_000_000) return (n/1_000_000).toFixed(1)+"M";
  if (n >= 1_000) return (n/1_000).toFixed(1)+"K";
  return String(n);
}
function pct(a,b) { if(!b) return null; return Math.round(((a-b)/b)*100); }
function nowMonth() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; }
function useIsMobile() {
  const [m,setM] = useState(window.innerWidth<768);
  useEffect(()=>{const h=()=>setM(window.innerWidth<768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
  return m;
}

function Inp({ label, value, onChange, type="text", placeholder, autoComplete, hint }) {

function Btn({ children, onClick, color, outline, disabled, full, small, danger }) {
  const bg = danger?T.red:outline?"transparent":(color||T.accentBright);
  return (
    <button onClick={onClick} disabled={disabled} style={{
      background:disabled?T.muted:bg, border:outline?`1.5px solid ${color||T.border}`:"none",
      color:disabled?"#444":"#fff", borderRadius:small?10:14, padding:small?"8px 14px":"12px 22px",
      cursor:disabled?"not-allowed":"pointer", fontWeight:700, fontSize:small?13:15,
      width:full?"100%":"auto", fontFamily:"inherit", WebkitAppearance:"none",
      transition:"all 0.15s", whiteSpace:"nowrap", touchAction:"manipulation", opacity:disabled?0.5:1,
      boxShadow:!disabled&&!outline?`0 2px 16px ${(color||T.accentBright)}33`:"none"
    }}
      onMouseEnter={e=>{if(!disabled)e.currentTarget.style.opacity="0.85";}}
      onMouseLeave={e=>{e.currentTarget.style.opacity="1";}}

}

// ═══════════════════════════════════════════════════════════
function VideoForm({ initial, onSave, onClose, clientColor }) {
  const [url,setUrl]            = useState(initial?.url||"");
  const [title,setTitle]        = useState(initial?.title||"");
  const [author,setAuthor]      = useState("");
  const [thumbnail,setThumb]    = useState("");
  const [views,setViews]        = useState(initial?.views!=null?String(initial.views):"");
  const [likes,setLikes]        = useState(initial?.likes!=null?String(initial.likes):"");
  const [followers,setFollowers]= useState(initial?.followers!=null?String(initial.followers):"");
  const [date,setDate]          = useState(initial?.date||new Date().toISOString().split("T")[0]);
  const [status,setStatus]      = useState("idle");
  const [msg,setMsg]            = useState("");

  const backendReady = BACKEND_URL && !BACKEND_URL.includes("JOUW_RENDER");

  async function tryFetch() {
    if(!url||!url.includes("tiktok.com")) return;
    if(!backendReady) {
      setStatus("no-backend");
      setMsg("Backend nog niet ingesteld. Zie HANDLEIDING.md. Je kunt nu alvast handmatig invullen.");
      return;
    }
    setStatus("loading"); setMsg("");
    try {
      const res = await fetch(`${BACKEND_URL}/tiktok/video?url=${encodeURIComponent(url)}`);
      if(!res.ok) throw new Error("Server fout");
      const d = await res.json();
      if(d.success) {
        if(d.title && !title) setTitle(d.title);
        if(d.author)          setAuthor(d.author);
        if(d.thumbnail)       setThumb(d.thumbnail);
        setStatus("ok");
        setMsg("✅ Titel & auteur opgehaald! Vul views/likes/volgers in via TikTok Creator Center.");
      } else {
        setStatus("error");
        setMsg(d.error||"Ophalen mislukt. Video publiek? Vul handmatig in.");
      }
    } catch {
      setStatus("error");
      setMsg("Backend niet bereikbaar. Eerste verzoek op Render kan 30-60s duren — probeer opnieuw.");
    }
  }

  function save() {
    if(!url||!date) return;
    onSave({ id:initial?.id||"v"+Date.now(), url, title, views:parseInt(views)||0, likes:parseInt(likes)||0, followers:parseInt(followers)||0, date });
  }

  const isValid = url.includes("tiktok.com") && date;
  const borderCol = url && !url.includes("tiktok.com") ? T.red : status==="ok" ? T.green : T.border;

  return (
    <>
      <div style={{marginBottom:14}}>
        <div style={{color:T.mutedLight,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,marginBottom:5}}>🎵 TikTok video URL</div>
        <div style={{display:"flex",gap:8}}>
          <input value={url} onChange={e=>{setUrl(e.target.value);setStatus("idle");setMsg("");}}
            placeholder="https://tiktok.com/@.../video/7350000000000000001"
            style={{flex:1,background:T.bg,border:`1.5px solid ${borderCol}`,borderRadius:12,padding:"12px 15px",color:T.text,fontSize:14,outline:"none",fontFamily:"inherit",transition:"border-color 0.2s"}}
            onFocus={e=>e.target.style.borderColor=T.accentBright} onBlur={e=>e.target.style.borderColor=borderCol}
          />
          <Btn small color={T.tiktok} onClick={tryFetch} disabled={!url||status==="loading"}>
            {status==="loading"?"⏳ Laden...":"🔍 Ophalen"}
          </Btn>
        </div>
        {url && !url.includes("tiktok.com") && <div style={{color:T.red,fontSize:11,marginTop:4}}>⚠ Plak een geldige TikTok video link</div>}
        {msg && (
          <div style={{marginTop:7,padding:"9px 12px",borderRadius:10,fontSize:12,fontWeight:600,lineHeight:1.5,
            background:status==="ok"?T.greenSoft:T.redSoft,
            color:status==="ok"?T.green:T.red}}>
            {msg}
          </div>
        )}
      </div>

      {(author||thumbnail) && status==="ok" && (
        <div style={{display:"flex",gap:12,marginBottom:14,background:T.surface,borderRadius:12,padding:"12px",border:`1px solid ${T.green}44`}}>
          {thumbnail && <img src={thumbnail} alt="" style={{width:54,height:54,borderRadius:8,objectFit:"cover",flexShrink:0}} onError={e=>e.target.style.display="none"}/>}
          <div style={{flex:1,minWidth:0}}>
            {author && <div style={{color:T.accentBright,fontWeight:700,fontSize:13,marginBottom:3}}>🎵 @{author}</div>}
            <a href={url} target="_blank" rel="noreferrer" style={{color:T.tiktok,fontSize:12,textDecoration:"none",fontWeight:600}}>Bekijk video op TikTok ↗</a>
          </div>
        </div>
      )}

      <Inp label="Titel / omschrijving" value={title} onChange={setTitle} placeholder="Naam van de video"/>

      <div style={{marginBottom:12,padding:"14px",background:T.surface,borderRadius:12,border:`1px solid ${T.border}`}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <span style={{fontSize:15}}>📊</span>
          <span style={{color:T.text,fontWeight:700,fontSize:13}}>Stats handmatig invullen</span>
          <span style={{marginLeft:"auto",color:T.muted,fontSize:10}}>TikTok Creator Center</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[["👁","Views",views,setViews],["❤️","Likes",likes,setLikes],["👥","+Volgers",followers,setFollowers]].map(([icon,lbl,val,set])=>(
            <div key={lbl} style={{background:T.bg,borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
              <div style={{fontSize:18,marginBottom:4}}>{icon}</div>
              <input type="number" value={val} onChange={e=>set(e.target.value)} placeholder="0"
                style={{width:"100%",boxSizing:"border-box",background:"transparent",border:"none",borderBottom:`1.5px solid ${T.border}`,color:T.text,fontSize:18,fontWeight:900,textAlign:"center",outline:"none",fontFamily:"inherit",padding:"2px 0"}}
                onFocus={e=>e.target.style.borderBottomColor=T.accentBright} onBlur={e=>e.target.style.borderBottomColor=T.border}
              />
              <div style={{color:T.muted,fontSize:10,marginTop:4}}>{lbl}</div>
            </div>
          ))}
        </div>
      </div>

      <Inp label="Datum" value={date} onChange={setDate} type="date"/>

      <div style={{marginBottom:14,padding:"10px 14px",background:T.surface,borderRadius:10,border:`1px solid ${T.border}`}}>
        <div style={{color:T.accentBright,fontSize:11,fontWeight:700,marginBottom:5}}>💡 Hoe vind je de stats in TikTok?</div>
        <div style={{color:T.textDim,fontSize:12,lineHeight:1.7}}>
          1. Open TikTok app → ga naar het video<br/>
          2. Tik op <strong style={{color:T.text}}>···</strong> (drie puntjes) → <strong style={{color:T.text}}>Creator Inzichten</strong><br/>
          3. Kopieer views, likes en nieuwe volgers hier naartoe
        </div>
      </div>

      <Btn full color={clientColor||T.primaryMid} disabled={!isValid} onClick={save}>
        {isValid ? "✅ Video opslaan" : "Vul een TikTok URL en datum in"}
      </Btn>
    </>
  );
}

// LOGIN

function LoginScreen({ data, onLogin }) {
  const [email,setEmail]=useState(""); const [pass,setPass]=useState(""); const [err,setErr]=useState(""); const [tab,setTab]=useState("client");
  function doLogin() {
    setErr("");
    if(tab==="agency") { if(pass===data.agency.password) onLogin({role:"agency"}); else setErr("Verkeerd wachtwoord"); }
    else { const c=data.clients.find(c=>c.email===email&&c.password===pass); if(c) onLogin({role:"client",clientId:c.id}); else setErr("E-mail of wachtwoord onjuist"); }
  }
  return (
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20,
      backgroundImage:"radial-gradient(ellipse at 20% 50%, #0A2A0A 0%, transparent 55%), radial-gradient(ellipse at 80% 20%, #081808 0%, transparent 50%)"}}>
      <div style={{width:"100%",maxWidth:400}}>
        <div style={{textAlign:"center",marginBottom:44}}>
          <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:72,height:72,borderRadius:22,background:`linear-gradient(135deg,${T.primary},${T.primaryMid})`,marginBottom:20,boxShadow:`0 8px 32px ${T.primary}55`}}>
            <LogoImg height={32} variant="white"/>
          </div>
          <LogoImg height={30} variant="green" style={{display:"block",margin:"0 auto"}}/>
          <div style={{color:T.mutedLight,fontSize:13,marginTop:8}}>Social Media Management Platform</div>
        </div>
        <div style={{display:"flex",background:T.card,borderRadius:16,padding:4,marginBottom:22,border:`1px solid ${T.border}`}}>
          {[["client","👤 Klant"],["agency","🌿 Agency"]].map(([id,lbl])=>(
            <button key={id} onClick={()=>{setTab(id);setErr("");}} style={{flex:1,background:tab===id?`linear-gradient(135deg,${T.primary},${T.primaryMid})`:"transparent",border:"none",borderRadius:12,color:tab===id?"#fff":T.mutedLight,padding:"11px",cursor:"pointer",fontWeight:700,fontSize:14,fontFamily:"inherit",transition:"all 0.2s",boxShadow:tab===id?`0 2px 12px ${T.primary}55`:"none"}}>{lbl}</button>
          ))}
        </div>
        <Card style={{padding:26}}>
          {tab==="client"&&<Inp label="E-mailadres" value={email} onChange={setEmail} type="email" placeholder="jouw@email.nl" autoComplete="email"/>}
          <Inp label="Wachtwoord" value={pass} onChange={setPass} type="password" placeholder="••••••••" autoComplete="current-password"/>
          {err&&<div style={{background:T.redSoft,border:`1px solid ${T.red}33`,color:T.red,borderRadius:10,padding:"10px 14px",fontSize:13,marginBottom:14,fontWeight:600}}>⚠ {err}</div>}
          <Btn full color={T.primaryMid} onClick={doLogin}>Inloggen →</Btn>

        </Card>
      </div>
    </div>
  );
}

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
                  <div><div style={{color:T.text,fontWeight:700,fontSize:15,marginBottom:3}}>{new Date(b.date).toLocaleDateString("nl-NL",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div><div style={{color:T.textDim,fontSize:13}}>🕐 {b.time} uur</div>{b.note&&<div style={{color:T.mutedLight,fontSize:12,marginTop:2}}>📝 {b.note}</div>}</div>
                  <Badge color={sc(b.status)}>{sl(b.status)}</Badge>

                {b.agencyNote&&<div style={{marginTop:10,background:T.surface,borderRadius:10,padding:"9px 13px",borderLeft:`3px solid ${sc(b.status)}`}}><div style={{color:T.muted,fontSize:10,fontWeight:700,marginBottom:3,textTransform:"uppercase",letterSpacing:1}}>Bericht BarakahPortal</div><div style={{color:T.textDim,fontSize:13}}>{b.agencyNote}</div></div>}
              </Card>

        <div style={{position:"fixed",bottom:0,left:0,right:0,background:T.surface+"F8",backdropFilter:"blur(16px)",borderTop:`1px solid ${T.border}`,padding:"7px 0 calc(7px + env(safe-area-inset-bottom,0px))",display:"flex",justifyContent:"space-around",zIndex:100}}>
          {tabs.map(([id,icon,lbl])=>(
            <button key={id} onClick={()=>setTab(id)} style={{background:"transparent",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:tab===id?color:T.muted,cursor:"pointer",fontFamily:"inherit",padding:"3px 14px",fontWeight:tab===id?700:500,fontSize:10}}>
              <span style={{fontSize:22}}>{icon}</span>{lbl}
            </button>
          ))}
        </div>
      )}

      {/* WhatsApp FAB */}
      {isMob&&<a href="https://wa.me/31685546310?text=Hoi%20BarakahPortal!%20Ik%20heb%20een%20vraag%3A%20" target="_blank" rel="noreferrer" style={{position:"fixed",bottom:80,right:14,width:50,height:50,borderRadius:"50%",background:"#25D366",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,boxShadow:"0 4px 20px rgba(37,211,102,0.5)",zIndex:200,textDecoration:"none"}}>💬</a>}

      {/* PDF PREVIEW */}
      {showPDF && <PDFModal client={client} onClose={()=>setShowPDF(false)}/>}

      {sheet==="booking"&&(
        <Sheet title="📅 Opname aanvragen" onClose={()=>{setSheet(null);setBMsg("");setBForm({date:"",time:"10:00",note:""});}}>
          {bMsg==="success"?(<div style={{textAlign:"center",padding:"24px 0"}}><div style={{fontSize:48,marginBottom:14}}>✅</div><div style={{color:T.green,fontWeight:800,fontSize:17,marginBottom:6}}>Aanvraag verstuurd!</div><div style={{color:T.mutedLight,fontSize:14}}>Je hoort snel van ons.</div></div>):(
            <>{bMsg&&<div style={{color:T.red,fontSize:13,marginBottom:10,fontWeight:600}}>⚠ {bMsg}</div>}<Inp label="Datum" value={bForm.date} onChange={v=>setBForm(f=>({...f,date:v}))} type="date"/><Inp label="Voorkeurstijd" value={bForm.time} onChange={v=>setBForm(f=>({...f,time:v}))} type="time"/><Inp label="Opmerking (optioneel)" value={bForm.note} onChange={v=>setBForm(f=>({...f,note:v}))} placeholder="Locatie, wensen..."/><Btn full color={T.primaryMid} onClick={submitBooking}>Aanvraag versturen 🌿</Btn></>
          )}
        </Sheet>
      )}
    </div>
  );
}

// AGENCY PORTAL
// ═══════════════════════════════════════════════════════════
function AgencyPortal({ data, setData, onLogout }) {
  const isMob = useIsMobile();
  const [tab,setTab]               = useState("bookings");
  const [activeClient,setActiveClient] = useState(data.clients[0]?.id||null);
  const [sheet,setSheet]           = useState(null);
  const [editVideo,setEditVideo]   = useState(null);
  const [cForm,setCForm]           = useState({name:"",email:"",password:"",color:CLIENT_COLORS[0],tiktokProfile:"",packageTotal:"8",packageLabel:"8 videos/maand"});
  const [noteMap,setNoteMap]       = useState({});
  const [syncStatus,setSyncStatus] = useState({}); // idle|syncing|ok|error per clientId
  const [syncMsg,setSyncMsg]       = useState({});
  const [syncAll,setSyncAll]       = useState(false);
  const [pdfClient,setPdfClient]   = useState(null);
  const [settingsForm,setSettingsForm] = useState({
    agencyName:"", newPassword:"", confirmPassword:"", waNumber:""
  });
  const [settingsMsg,setSettingsMsg] = useState("");

  const backendReady = BACKEND_URL && !BACKEND_URL.includes("JOUW_RENDER");
  const pending      = data.bookings.filter(b=>b.status==="pending");
  const client       = data.clients.find(c=>c.id===activeClient);

  const updateClient     = fn=>setData(d=>({...d,clients:d.clients.map(c=>c.id===activeClient?fn(c):c)}));
  const updateClientById = (id,fn)=>setData(d=>({...d,clients:d.clients.map(c=>c.id===id?fn(c):c)}));

  function acceptBooking(id,note=""){setData(d=>({...d,bookings:d.bookings.map(b=>b.id===id?{...b,status:"accepted",agencyNote:note}:b)}));}
  function declineBooking(id,note=""){setData(d=>({...d,bookings:d.bookings.map(b=>b.id===id?{...b,status:"declined",agencyNote:note}:b)}));}

  // ── TIKTOK SYNC via backend ────────────────────────────
  async function syncOneClient(c) {
    if(!c.tiktokProfile){ setSyncMsg(m=>({...m,[c.id]:"⚠ Geen TikTok profiel ingesteld"})); return; }
    if(!backendReady){    setSyncMsg(m=>({...m,[c.id]:"⚠ Stel BACKEND_URL in (zie handleiding)"})); return; }
    const username = c.tiktokProfile.replace(/.*@/,"").split("?")[0].split("/")[0];
    setSyncStatus(s=>({...s,[c.id]:"syncing"}));
    setSyncMsg(m=>({...m,[c.id]:"⏳ Bezig..."}));
    try {
      const res = await fetch(`${BACKEND_URL}/sync/${c.id}`,{
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({tiktokUsername:username})
      });
      const d = await res.json();
      if(!d.success) throw new Error(d.error||"Onbekende fout");
      const month  = nowMonth();
      const totV   = d.videos.reduce((s,v)=>s+(v.views||0),0);
      const totL   = d.videos.reduce((s,v)=>s+(v.likes||0),0);
      const totF   = d.profile?.followers||0;
      const entry  = {month,views:totV,likes:totL,followers:totF,videos:d.videos.length};
      updateClientById(c.id, cl=>({
        ...cl,
        tiktokStats: d.profile,
        videos: d.videos.map(v=>({
          id:v.id, url:v.url, title:v.title||"(geen titel)",
          views:v.views, likes:v.likes, followers:0, date:v.date, thumb:v.thumb
        })),
        package:{...cl.package, used:Math.min(d.videos.length, cl.package.total)},
        history: cl.history.some(h=>h.month===month)
          ? cl.history.map(h=>h.month===month?entry:h)
          : [...cl.history,entry]
      }));
      setSyncStatus(s=>({...s,[c.id]:"ok"}));
      const t = new Date().toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"});
      setSyncMsg(m=>({...m,[c.id]:`✅ ${d.videos.length} videos · ${t}`}));
    } catch(err) {
      setSyncStatus(s=>({...s,[c.id]:"error"}));
      setSyncMsg(m=>({...m,[c.id]:`❌ ${err.message}`}));
    }
  }

  async function syncAllClients() {
    setSyncAll(true);
    for(const c of data.clients.filter(c=>c.tiktokProfile)) await syncOneClient(c);
    setSyncAll(false);
  }
  // ──────────────────────────────────────────────────────

  function saveVideo(nv){
    updateClient(c=>({...c,videos:editVideo?c.videos.map(v=>v.id===editVideo.id?nv:v):[...c.videos,nv],package:editVideo?c.package:{...c.package,used:c.package.used+1}}));
    setSheet(null); setEditVideo(null);
  }
  function deleteVideo(id){updateClient(c=>({...c,videos:c.videos.filter(v=>v.id!==id),package:{...c.package,used:Math.max(0,c.package.used-1)}}));}

  function saveMonth(){
    if(!client) return;
    const totV=client.videos.reduce((s,v)=>s+(v.views||0),0);
    const totL=client.videos.reduce((s,v)=>s+(v.likes||0),0);
    const totF=client.tiktokStats?.followers||0;
    const month=nowMonth();
    const entry={month,views:totV,likes:totL,followers:totF,videos:client.videos.length};
    updateClient(c=>({...c,history:c.history.some(h=>h.month===month)?c.history.map(h=>h.month===month?entry:h):[...c.history,entry]}));
    alert("✅ Maand opgeslagen!");
  }

  function addClient(){
    const nc={id:"c"+Date.now(),name:cForm.name,email:cForm.email,password:cForm.password,color:cForm.color,
      tiktokProfile:cForm.tiktokProfile,
      package:{total:parseInt(cForm.packageTotal)||8,used:0,label:cForm.packageLabel},
      history:[],videos:[]};
    setData(d=>({...d,clients:[...d.clients,nc]})); setSheet(null);
  }

  const sc=s=>s==="accepted"?T.green:s==="declined"?T.red:T.gold;
  const sl=s=>s==="accepted"?"✅ Bevestigd":s==="declined"?"❌ Afgewezen":"⏳ Wacht op actie";
  const allBookings=[...data.bookings].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const tabs=[["bookings","📅","Aanvragen"],["clients","👥","Klanten"],["stats","📊","Statistieken"],["settings","⚙️","Instellingen"]];
  const totalV=client?.videos.reduce((s,v)=>s+(v.views||0),0)??0;
  const totalL=client?.videos.reduce((s,v)=>s+(v.likes||0),0)??0;
  const totalF=client?.tiktokStats?.followers||0;
  const prevH =client?.history?.[client.history.length-2];
  return (
    <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"DM Sans,Segoe UI,sans-serif",paddingBottom:isMob?88:0}}>
      {/* Header */}
      <div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:isMob?"13px 16px":"0 30px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,backdropFilter:"blur(12px)",minHeight:60}}>
        <LogoImg height={isMob?22:26}/>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{background:T.accentSoft,border:`1px solid ${T.accent}33`,borderRadius:8,padding:"3px 10px"}}><span style={{color:T.accent,fontSize:11,fontWeight:700}}>🌿 Agency</span></div>
          {pending.length>0&&<div style={{background:T.redSoft,color:T.red,borderRadius:99,padding:"4px 10px",fontSize:11,fontWeight:800}}>🔔 {pending.length}</div>}
          <button onClick={onLogout} style={{background:T.border,border:"none",color:T.mutedLight,borderRadius:10,padding:"6px 12px",cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"inherit"}}>Uitloggen</button>
        </div>
      </div>

      <div style={{display:"flex",maxWidth:1200,margin:"0 auto"}}>
        {/* Desktop sidebar */}
        {!isMob&&(
          <div style={{width:220,background:T.surface,borderRight:`1px solid ${T.border}`,minHeight:"calc(100vh - 60px)",padding:"18px 10px",flexShrink:0}}>
            <div style={{color:T.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1.4,padding:"0 10px",marginBottom:8}}>Klanten</div>
            {data.clients.map(c=>{
              const act=c.id===activeClient&&tab==="stats"; const left=c.package.total-c.package.used;
              return(
                <button key={c.id} onClick={()=>{setActiveClient(c.id);setTab("stats");}} style={{width:"100%",background:act?c.color+"18":"transparent",border:act?`1px solid ${c.color}40`:"1px solid transparent",borderRadius:10,padding:"10px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,marginBottom:3,transition:"all 0.15s",fontFamily:"inherit"}}>
                  <div style={{width:9,height:9,borderRadius:"50%",background:c.color,flexShrink:0}}/>
                  <span style={{color:act?T.text:T.mutedLight,fontSize:13,fontWeight:600,flex:1,textAlign:"left",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</span>
                  <span style={{fontSize:11,color:left<=2?T.red:T.muted,fontWeight:700}}>{left}</span>
                </button>
              );
            })}
            <button onClick={()=>{setCForm({name:"",email:"",password:"",color:CLIENT_COLORS[data.clients.length%CLIENT_COLORS.length],tiktokProfile:"",packageTotal:"8",packageLabel:"8 videos/maand"});setSheet("addClient");}} style={{width:"100%",background:"transparent",border:`1px dashed ${T.border}`,borderRadius:10,padding:"9px 12px",cursor:"pointer",color:T.muted,fontSize:12,marginTop:8,fontFamily:"inherit"}}>+ Klant toevoegen</button>
            <div style={{height:1,background:T.border,margin:"14px 0"}}/>
            {tabs.map(([id,icon,lbl])=>(
              <button key={id} onClick={()=>setTab(id)} style={{width:"100%",background:tab===id?T.primaryMid+"22":"transparent",border:tab===id?`1px solid ${T.primaryMid}33`:"1px solid transparent",borderRadius:10,padding:"10px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,marginBottom:3,color:tab===id?T.accentBright:T.mutedLight,fontFamily:"inherit",fontSize:13,fontWeight:600,transition:"all 0.15s"}}>
                <span>{icon}</span><span>{lbl}</span>
                {id==="bookings"&&pending.length>0&&<span style={{marginLeft:"auto",background:T.red,color:"#fff",borderRadius:99,padding:"1px 7px",fontSize:11,fontWeight:800}}>{pending.length}</span>}
              </button>
            ))}
          </div>
        )}

        <div style={{flex:1,padding:isMob?"14px 14px":28,overflowY:"auto"}}>

          {/* BOOKINGS */}
          {tab==="bookings"&&(
            <>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><h2 style={{margin:0,fontSize:19,fontWeight:900}}>📅 Opname aanvragen</h2>{pending.length>0&&<Badge color={T.red}>{pending.length} te behandelen</Badge>}</div>
              {allBookings.length===0?(<Card style={{padding:44,textAlign:"center"}}><div style={{fontSize:38,marginBottom:10}}>📅</div><div style={{color:T.mutedLight}}>Nog geen aanvragen</div></Card>)
              :allBookings.map(b=>{
                const bc=data.clients.find(c=>c.id===b.clientId); const note=noteMap[b.id]||"";
                return(
                  <Card key={b.id} style={{padding:"16px 18px",marginBottom:10,borderLeft:b.status==="pending"?`3px solid ${T.gold}`:`3px solid ${sc(b.status)}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8,marginBottom:10}}>
                      <div>
                        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}><div style={{width:8,height:8,borderRadius:"50%",background:bc?.color||T.muted}}/><span style={{fontWeight:800,fontSize:15,color:T.text}}>{bc?.name||"?"}</span><Badge color={sc(b.status)}>{sl(b.status)}</Badge></div>
                        <div style={{color:T.text,fontSize:14,fontWeight:600,marginBottom:2}}>📅 {new Date(b.date).toLocaleDateString("nl-NL",{weekday:"long",day:"numeric",month:"long",year:"numeric"})} · 🕐 {b.time}</div>
                        {b.note&&<div style={{color:T.muted,fontSize:13,marginTop:3}}>📝 {b.note}</div>}
                        <div style={{color:T.muted,fontSize:11,marginTop:4}}>{new Date(b.createdAt).toLocaleString("nl-NL")}</div>
                      </div>
                    </div>
                    {b.status==="pending"&&(
                      <><input value={note} onChange={e=>setNoteMap(m=>({...m,[b.id]:e.target.value}))} placeholder="Optioneel bericht aan klant..." style={{width:"100%",boxSizing:"border-box",background:T.bg,border:`1px solid ${T.border}`,borderRadius:10,padding:"9px 13px",color:T.text,fontSize:13,outline:"none",fontFamily:"inherit",marginBottom:9}} onFocus={e=>e.target.style.borderColor=T.accentBright} onBlur={e=>e.target.style.borderColor=T.border}/><div style={{display:"flex",gap:8}}><Btn small color={T.green} onClick={()=>acceptBooking(b.id,note)}>✅ Accepteren</Btn><Btn small danger onClick={()=>declineBooking(b.id,note)}>❌ Afwijzen</Btn></div></>
                    )}
                    {b.agencyNote&&b.status!=="pending"&&<div style={{marginTop:9,background:T.surface,borderRadius:10,padding:"9px 13px",borderLeft:`3px solid ${sc(b.status)}`}}><div style={{color:T.muted,fontSize:10,fontWeight:700,marginBottom:3,textTransform:"uppercase",letterSpacing:1}}>Jouw bericht</div><div style={{color:T.textDim,fontSize:13}}>{b.agencyNote}</div></div>}
                  </Card>
                );
              })}
            </>
          )}

          {/* CLIENTS */}
          {tab==="clients"&&(
            <>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
                <h2 style={{margin:0,fontSize:19,fontWeight:900}}>👥 Klantenbeheer</h2>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={syncAllClients} disabled={syncAll} style={{
                    display:"flex",alignItems:"center",gap:6,background:T.accentSoft,
                    border:`1.5px solid ${T.accentBright}`,color:T.accentBright,
                    borderRadius:10,padding:"7px 14px",cursor:syncAll?"not-allowed":"pointer",
                    fontWeight:700,fontSize:13,fontFamily:"inherit",opacity:syncAll?0.7:1
                  }}>
                    {syncAll?"⏳ Alle klanten syncen...":"🔄 Alle klanten syncen"}
                  </button>
                  <Btn small color={T.primaryMid} onClick={()=>{setCForm({name:"",email:"",password:"",color:CLIENT_COLORS[data.clients.length%CLIENT_COLORS.length],tiktokProfile:"",packageTotal:"8",packageLabel:"8 videos/maand"});setSheet("addClient");}}>+ Toevoegen</Btn>
                </div>
              </div>
              {data.clients.map(c=>{
                const left=c.package.total-c.package.used;
                return(
                  <Card key={c.id} style={{padding:"18px",marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10,marginBottom:12}}>
                      <div style={{display:"flex",alignItems:"center",gap:12}}>
                        <div style={{width:46,height:46,borderRadius:13,background:c.color+"22",border:`1px solid ${c.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:900,color:c.color}}>{c.name.charAt(0)}</div>
                        <div><div style={{fontWeight:800,fontSize:16,color:T.text}}>{c.name}</div><div style={{color:T.mutedLight,fontSize:13}}>{c.email}</div>{c.tiktokProfile&&<a href={c.tiktokProfile} target="_blank" rel="noreferrer" style={{color:T.tiktok,fontSize:12,textDecoration:"none",fontWeight:600}}>🎵 TikTok profiel ↗</a>}</div>
                      </div>
                      <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}><Badge color={left<=2?T.red:c.color}>{left} over</Badge><Btn small color={c.color} onClick={()=>{setActiveClient(c.id);setTab("stats");}}>📊 Stats</Btn><Btn small danger onClick={()=>{
                          setData(d=>({...d,clients:d.clients.filter(cl=>cl.id!==c.id),bookings:d.bookings.filter(b=>b.clientId!==c.id)}));
                          if(activeClient===c.id) setActiveClient(data.clients.filter(cl=>cl.id!==c.id)[0]?.id||null);
                        }}>🗑 Verwijderen</Btn></div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                      {[["👁",c.videos.reduce((s,v)=>s+(v.views||0),0),"Views"],["❤️",c.videos.reduce((s,v)=>s+(v.likes||0),0),"Likes"],["🎬",c.videos.length,"Videos"]].map(([icon,val,lbl])=>(
                        <div key={lbl} style={{background:T.bg,borderRadius:10,padding:"9px",textAlign:"center"}}><div style={{fontSize:15}}>{icon}</div><div style={{color:T.text,fontWeight:800,fontSize:15}}>{fmt(val)}</div><div style={{color:T.muted,fontSize:11}}>{lbl}</div></div>
                      ))}
                    </div>
                  </Card>
                );
              })}
            </>
          )}

          {/* STATS */}
          {tab==="stats"&&(
            <>
              {!client ? (
                <div style={{textAlign:"center",padding:"60px 20px",color:T.mutedLight}}>
                  <div style={{fontSize:38,marginBottom:10}}>👈</div>
                  <div>Selecteer een klant in de sidebar</div>
                </div>
              ) : (
                <>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,flexWrap:"wrap",gap:10}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                        <div style={{width:10,height:10,borderRadius:"50%",background:client.color}}/>
                        <h2 style={{margin:0,fontSize:20,fontWeight:900}}>{client.name}</h2>
                      </div>
                      {client.tiktokProfile&&<a href={client.tiktokProfile} target="_blank" rel="noreferrer" style={{color:T.tiktok,fontSize:12,textDecoration:"none",fontWeight:600}}>🎵 {client.tiktokProfile}</a>}
                    </div>
                    <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
                      <button onClick={()=>syncOneClient(client)} disabled={syncStatus[client.id]==="syncing"} style={{
                        display:"flex",alignItems:"center",gap:7,
                        background:syncStatus[client.id]==="ok"?T.greenSoft:syncStatus[client.id]==="error"?T.redSoft:T.accentSoft,
                        border:`1.5px solid ${syncStatus[client.id]==="ok"?T.green:syncStatus[client.id]==="error"?T.red:T.accentBright}`,
                        color:syncStatus[client.id]==="ok"?T.green:syncStatus[client.id]==="error"?T.red:T.accentBright,
                        borderRadius:10,padding:"7px 14px",cursor:syncStatus[client.id]==="syncing"?"not-allowed":"pointer",
                        fontWeight:700,fontSize:13,fontFamily:"inherit",opacity:syncStatus[client.id]==="syncing"?0.7:1
                      }}>
                        <span>{syncStatus[client.id]==="syncing"?"⏳":syncStatus[client.id]==="ok"?"✅":syncStatus[client.id]==="error"?"❌":"🔄"}</span>
                        {syncStatus[client.id]==="syncing"?"Syncen...":"TikTok Sync"}
                      </button>
                      <Btn small outline color={T.border} onClick={saveMonth}>💾 Maand opslaan</Btn>
                      <Btn small outline color={T.green} onClick={()=>setShowPDF(true)}>📄 PDF</Btn>
                    </div>
                  </div>

                  {syncMsg[client.id]&&(
                    <div style={{marginBottom:12,padding:"9px 14px",borderRadius:10,fontSize:12,fontWeight:600,
                      background:syncStatus[client.id]==="ok"?T.greenSoft:syncStatus[client.id]==="error"?T.redSoft:T.accentSoft,
                      color:syncStatus[client.id]==="ok"?T.green:syncStatus[client.id]==="error"?T.red:T.accentBright,
                      border:`1px solid ${syncStatus[client.id]==="ok"?T.green+"44":syncStatus[client.id]==="error"?T.red+"44":T.accentBright+"44"}`}}>
                      {syncMsg[client.id]}
                      {syncStatus[client.id]==="ok"&&client.tiktokStats&&(
                        <span style={{marginLeft:10,color:T.mutedLight,fontWeight:400}}>
                          · {fmt(client.tiktokStats.followers)} volgers · @{client.tiktokStats.username}
                        </span>
                      )}
                    </div>
                  )}

                  {!client.tiktokProfile&&(
                    <div style={{marginBottom:12,padding:"10px 14px",borderRadius:10,background:T.goldSoft,border:`1px solid ${T.gold}44`,fontSize:12,color:T.gold,fontWeight:600}}>
                      ⚠ Koppel een TikTok profiel aan deze klant voor automatische sync
                    </div>
                  )}

                  <div style={{display:"grid",gridTemplateColumns:isMob?"1fr 1fr":"repeat(4,1fr)",gap:10,marginBottom:12}}>
                    <StatTile icon="👁" label="Views" value={totalV} prev={prevH?.views} color={T.accentBright}/>
                    <StatTile icon="❤️" label="Likes" value={totalL} prev={prevH?.likes} color={T.gold}/>
                    <StatTile icon="👥" label="Volgers" value={totalF} prev={prevH?.followers} color={T.green}/>
                    <StatTile icon="🎬" label="Videos" value={client.videos.length} color={T.blue}/>
                  </div>

                  <div style={{marginBottom:14}}><PkgBar pkg={client.package} color={client.color}/></div>

                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div style={{color:T.muted,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2}}>
                      Video's {syncStatus[client.id]==="ok"&&<span style={{color:T.green}}>· live data ✅</span>}
                    </div>
                    <Btn small color={T.primaryMid} onClick={()=>{setEditVideo(null);setSheet("video");}}>+ Handmatig</Btn>
                  </div>

                  {client.videos.length===0?(
                    <Card style={{padding:36,textAlign:"center",marginBottom:14}}>
                      <div style={{fontSize:32,marginBottom:10}}>🎵</div>
                      <div style={{color:T.mutedLight,marginBottom:12}}>
                        {client.tiktokProfile?"Druk op 🔄 TikTok Sync om video's automatisch op te halen":"Koppel een TikTok profiel of voeg handmatig video's toe"}
                      </div>
                      {client.tiktokProfile&&<Btn color={T.accentBright} onClick={()=>syncOneClient(client)}>🔄 Nu syncen</Btn>}
                    </Card>
                  ):client.videos.map(v=>(
                    <Card key={v.id} style={{padding:"12px 16px",marginBottom:8}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                        {v.thumb
                          ?<img src={v.thumb} alt="" style={{width:44,height:44,borderRadius:8,objectFit:"cover",flexShrink:0}} onError={e=>e.target.style.display="none"}/>
                          :<div style={{width:4,height:40,borderRadius:99,background:client.color,flexShrink:0}}/>
                        }
                        <div style={{flex:1,minWidth:120}}>
                          <div style={{color:T.text,fontWeight:700,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v.title||"Geen titel"}</div>
                          <a href={v.url} target="_blank" rel="noreferrer" style={{color:T.tiktok,fontSize:11,textDecoration:"none",fontWeight:600}}>🎵 TikTok ↗</a>
                        </div>
                        <div style={{display:"flex",gap:12,flexShrink:0}}>
                          {[["👁",v.views],["❤️",v.likes],["💬",v.comments||0]].map(([icon,val])=>(<div key={icon} style={{textAlign:"center"}}><div style={{color:T.text,fontWeight:800,fontSize:13}}>{fmt(val)}</div><div style={{color:T.muted,fontSize:10}}>{icon}</div></div>))}
                        </div>
                        <div style={{color:T.muted,fontSize:11,flexShrink:0}}>{v.date}</div>
                        <div style={{display:"flex",gap:5}}>
                          <Btn small outline color={T.border} onClick={()=>{setEditVideo(v);setSheet("video");}}>✏️</Btn>
                          <Btn small danger onClick={()=>deleteVideo(v.id)}>🗑</Btn>
                        </div>
                      </div>
                    </Card>
                  ))}

                  {client.history.length>=2&&(
                    <Card style={{padding:22,marginTop:14}}>
                      <div style={{color:T.mutedLight,fontSize:12,fontWeight:700,marginBottom:14}}>📈 Groei per maand</div>
                      <ResponsiveContainer width="100%" height={170}>
                        <BarChart data={client.history.map(h=>({name:MONTHS[parseInt(h.month.split("-")[1])-1],Views:h.views,Volgers:h.followers}))}>
                          <CartesianGrid strokeDasharray="3 3" stroke={T.border}/>
                          <XAxis dataKey="name" stroke={T.muted} tick={{fill:T.mutedLight,fontSize:11}}/>
                          <YAxis stroke={T.muted} tick={{fill:T.mutedLight,fontSize:11}} tickFormatter={v=>fmt(v)}/>
                          <Tooltip content={<CTip/>}/>
                          <Bar dataKey="Views" fill={client.color} radius={[5,5,0,0]}/>
                          <Bar dataKey="Volgers" fill={T.green} radius={[5,5,0,0]}/>
                        </BarChart>
                      </ResponsiveContainer>
                    </Card>
                  )}
                </>
              )}
            </>
          )}

          {/* ── INSTELLINGEN TAB ── */}
          {tab==="settings"&&(
            <>
              <h2 style={{margin:"0 0 24px",fontSize:19,fontWeight:900}}>⚙️ Instellingen</h2>

              {/* Agency naam */}
              <Card style={{padding:"22px 24px",marginBottom:16}}>
                <div style={{fontWeight:800,fontSize:15,color:T.text,marginBottom:4}}>🏢 Agency naam</div>
                <div style={{color:T.mutedLight,fontSize:12,marginBottom:14}}>Huidige naam: <strong style={{color:T.accentBright}}>{data.agency.name}</strong></div>
                <Inp label="Nieuwe naam" value={settingsForm.agencyName} onChange={v=>setSettingsForm(f=>({...f,agencyName:v}))} placeholder="BarakahPortal"/>
                <Btn color={T.primaryMid} disabled={!settingsForm.agencyName} onClick={()=>{
                  setData(d=>({...d,agency:{...d.agency,name:settingsForm.agencyName}}));
                  setSettingsForm(f=>({...f,agencyName:""}));
                  setSettingsMsg("✅ Naam opgeslagen!");
                  setTimeout(()=>setSettingsMsg(""),3000);
                }}>Naam opslaan</Btn>
              </Card>

              {/* Wachtwoord wijzigen */}
              <Card style={{padding:"22px 24px",marginBottom:16}}>
                <div style={{fontWeight:800,fontSize:15,color:T.text,marginBottom:4}}>🔑 Wachtwoord wijzigen</div>
                <div style={{color:T.mutedLight,fontSize:12,marginBottom:14}}>Dit is het wachtwoord waarmee je als agency inlogt</div>
                <Inp label="Nieuw wachtwoord" value={settingsForm.newPassword} onChange={v=>setSettingsForm(f=>({...f,newPassword:v}))} type="password" placeholder="Minimaal 6 tekens"/>
                <Inp label="Bevestig wachtwoord" value={settingsForm.confirmPassword} onChange={v=>setSettingsForm(f=>({...f,confirmPassword:v}))} type="password" placeholder="Herhaal wachtwoord"/>
                {settingsForm.newPassword && settingsForm.confirmPassword && settingsForm.newPassword !== settingsForm.confirmPassword && (
                  <div style={{color:T.red,fontSize:12,marginBottom:10,fontWeight:600}}>⚠ Wachtwoorden komen niet overeen</div>
                )}
                <Btn color={T.primaryMid}
                  disabled={!settingsForm.newPassword || settingsForm.newPassword !== settingsForm.confirmPassword || settingsForm.newPassword.length < 6}
                  onClick={()=>{
                    setData(d=>({...d,agency:{...d.agency,password:settingsForm.newPassword}}));
                    setSettingsForm(f=>({...f,newPassword:"",confirmPassword:""}));
                    setSettingsMsg("✅ Wachtwoord opgeslagen!");
                    setTimeout(()=>setSettingsMsg(""),3000);
                  }}>Wachtwoord opslaan</Btn>
              </Card>

              {/* WhatsApp nummer */}
              <Card style={{padding:"22px 24px",marginBottom:16}}>
                <div style={{fontWeight:800,fontSize:15,color:T.text,marginBottom:4}}>💬 WhatsApp nummer</div>
                <div style={{color:T.mutedLight,fontSize:12,marginBottom:14}}>Huidig: <strong style={{color:T.accentBright}}>+{data.agency.whatsapp}</strong></div>
                <Inp label="Nieuw WhatsApp nummer (zonder +)" value={settingsForm.waNumber} onChange={v=>setSettingsForm(f=>({...f,waNumber:v.replace(/\D/g,"")}))} placeholder="31685546310"/>
                <Btn color={T.primaryMid} disabled={!settingsForm.waNumber || settingsForm.waNumber.length < 10} onClick={()=>{
                  setData(d=>({...d,agency:{...d.agency,whatsapp:settingsForm.waNumber}}));
                  setSettingsForm(f=>({...f,waNumber:""}));
                  setSettingsMsg("✅ WhatsApp nummer opgeslagen!");
                  setTimeout(()=>setSettingsMsg(""),3000);
                }}>Nummer opslaan</Btn>
              </Card>

              {/* Feedback */}
              {settingsMsg && (
                <div style={{background:T.greenSoft,border:`1px solid ${T.green}44`,color:T.green,borderRadius:12,padding:"12px 16px",fontWeight:700,fontSize:14}}>
                  {settingsMsg}
                </div>
              )}

              {/* Danger zone */}
              <Card style={{padding:"22px 24px",marginTop:24,border:`1px solid ${T.red}44`}}>
                <div style={{fontWeight:800,fontSize:15,color:T.red,marginBottom:4}}>⚠️ Gegevens resetten</div>
                <div style={{color:T.mutedLight,fontSize:12,marginBottom:14}}>Verwijdert alle klanten en data. Kan niet ongedaan gemaakt worden.</div>
                <Btn danger onClick={()=>{
                  localStorage.removeItem(SK);
                  window.location.reload();
                }}>🗑 Alles resetten en opnieuw beginnen</Btn>
              </Card>
            </>
          )}
        </div>
      </div>

      {/* Mobile bottom nav */}
      {isMob&&(<div style={{position:"fixed",bottom:0,left:0,right:0,background:T.surface+"F8",backdropFilter:"blur(16px)",borderTop:`1px solid ${T.border}`,padding:"7px 0 calc(7px + env(safe-area-inset-bottom,0px))",display:"flex",justifyContent:"space-around",zIndex:100}}>
        {tabs.map(([id,icon,lbl])=>(<button key={id} onClick={()=>setTab(id)} style={{background:"transparent",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:tab===id?T.accentBright:T.muted,cursor:"pointer",fontFamily:"inherit",padding:"3px 14px",fontWeight:tab===id?700:500,fontSize:10,position:"relative"}}><span style={{fontSize:22}}>{icon}</span>{id==="bookings"&&pending.length>0&&<span style={{position:"absolute",top:0,right:6,background:T.red,color:"#fff",borderRadius:99,width:15,height:15,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800}}>{pending.length}</span>}{lbl}</button>))}
      </div>)}

      {/* Sheets */}
      {sheet==="video"&&(
        <Sheet title={editVideo?"Video bewerken":"Video toevoegen"} onClose={()=>{setSheet(null);setEditVideo(null);}}>
          <VideoForm initial={editVideo} onSave={saveVideo} onClose={()=>setSheet(null)} clientColor={client?.color}/>
        </Sheet>
      )}
      {sheet==="addClient"&&(
        <Sheet title="🌿 Klant toevoegen" onClose={()=>setSheet(null)}>
          <Inp label="Naam" value={cForm.name} onChange={v=>setCForm(f=>({...f,name:v}))} placeholder="Naam van je klant"/>
          <Inp label="E-mailadres (login)" value={cForm.email} onChange={v=>setCForm(f=>({...f,email:v}))} type="email" placeholder="klant@email.nl"/>
          <Inp label="Wachtwoord (login)" value={cForm.password} onChange={v=>setCForm(f=>({...f,password:v}))} type="password" placeholder="Kies een wachtwoord"/>
          <Inp label="🎵 TikTok profiel URL" value={cForm.tiktokProfile} onChange={v=>setCForm(f=>({...f,tiktokProfile:v}))} placeholder="https://tiktok.com/@username" hint="Koppel het TikTok account van de klant"/>
          <div style={{marginBottom:14}}>
            <div style={{color:T.mutedLight,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,marginBottom:7}}>Kleur</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{CLIENT_COLORS.map(col=>(<button key={col} onClick={()=>setCForm(f=>({...f,color:col}))} style={{width:34,height:34,borderRadius:9,background:col,cursor:"pointer",border:cForm.color===col?"3px solid #fff":"3px solid transparent"}}/>))}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10}}>
            <Inp label="Videos/maand" value={cForm.packageTotal} onChange={v=>setCForm(f=>({...f,packageTotal:v}))} type="number"/>
            <Inp label="Pakket naam" value={cForm.packageLabel} onChange={v=>setCForm(f=>({...f,packageLabel:v}))} placeholder="Pro — 12 videos/maand"/>
          </div>
          <Btn full color={T.primaryMid} disabled={!cForm.name||!cForm.email||!cForm.password} onClick={addClient}>Klant toevoegen 🌿</Btn>
        </Sheet>
      )}

      {/* PDF PREVIEW */}
      {pdfClient && <PDFModal client={pdfClient} onClose={()=>setPdfClient(null)}/>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// ROOT
// ═══════════════════════════════════════════════════════════
// PWA Install prompt
let deferredPrompt = null;
if (typeof window !== 'undefined') {
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
  });
}

function App() {
  const [data,setData] = useState(()=>load()||DEMO);
  const [session,setSession] = useState(null);
  const [showInstall,setShowInstall] = useState(false);

  useEffect(()=>{
    // Show install banner after 3 seconds if installable
    const timer = setTimeout(()=>{
      if(deferredPrompt) setShowInstall(true);
    }, 3000);
    return ()=>clearTimeout(timer);
  },[]);

  function installApp() {
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{
      deferredPrompt = null;
      setShowInstall(false);
    });
  }

  function setDataWrapped(fn) {
    if(typeof fn==="function") setData(d=>{const nd=fn(d);save(nd);return nd;});
    else{save(fn);setData(fn);}
  }

  // Forceer altijd correct WhatsApp nummer
  useEffect(()=>{
    if(data.agency?.whatsapp !== "31685546310")
      setData(d=>({...d,agency:{...d.agency,whatsapp:"31685546310"}}));
  },[]);
  useEffect(()=>{save(data);},[data]);

  const portal = !session
    ? <LoginScreen data={data} onLogin={setSession}/>
    : session.role==="agency"
      ? <AgencyPortal data={data} setData={setDataWrapped} onLogout={()=>setSession(null)}/>
      : <ClientPortal data={data} setData={setDataWrapped} clientId={session.clientId} onLogout={()=>setSession(null)}/>;

  return (
    <>
      {portal}
      {/* PWA Install Banner */}
      {showInstall && (
        <div style={{
          position:"fixed", bottom:16, left:16, right:16, zIndex:9999,
          background:"linear-gradient(135deg,#1A5C1A,#2D8C2D)",
          borderRadius:18, padding:"16px 20px",
          boxShadow:"0 8px 32px rgba(26,92,26,0.5)",
          display:"flex", alignItems:"center", gap:14,
          animation:"slideUp 0.4s ease"
        }}>
          <div style={{fontSize:36}}>🌿</div>
          <div style={{flex:1}}>
            <div style={{color:"#fff",fontWeight:800,fontSize:15,marginBottom:2}}>Installeer BarakahPortal</div>
            <div style={{color:"rgba(255,255,255,0.75)",fontSize:12}}>Voeg toe aan je homescreen als app</div>
          </div>
          <button onClick={installApp} style={{
            background:"#fff", color:"#1A5C1A", border:"none",
            borderRadius:12, padding:"9px 16px", fontWeight:800,
            fontSize:13, cursor:"pointer", fontFamily:"inherit",
            whiteSpace:"nowrap"
          }}>Installeren</button>
          <button onClick={()=>setShowInstall(false)} style={{
            background:"rgba(255,255,255,0.15)", color:"#fff", border:"none",
            borderRadius:10, width:32, height:32, cursor:"pointer",
            fontSize:18, display:"flex", alignItems:"center", justifyContent:"center"
          }}>✕</button>
        </div>
      )}
      <style>{`
        @keyframes slideUp {
          from { transform: translateY(100px); opacity: 0; }
          to   { transform: translateY(0);    opacity: 1; }
        }
      `}</style>
    </>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
